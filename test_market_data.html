<!DOCTYPE html>
<html>
<head>
    <title>Market Data Test - Quantum News PS23</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-result { margin: 10px 0; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        .success { background: #d4edda; border-color: #c3e6cb; color: #155724; }
        .error { background: #f8d7da; border-color: #f5c6cb; color: #721c24; }
        .loading { background: #d1ecf1; border-color: #bee5eb; color: #0c5460; }
    </style>
</head>
<body>
    <h1>🔍 Market Data Loading Test</h1>
    
    <div class="test-result loading">
        <strong>Testing market data loading...</strong>
    </div>
    
    <div id="test-results"></div>
    
    <script>
        async function testMarketData() {
            const resultsDiv = document.getElementById('test-results');
            
            try {
                // Test 1: Check if loadMarketData function exists
                if (typeof loadMarketData === 'function') {
                    resultsDiv.innerHTML += '<div class="test-result success">✅ loadMarketData function exists</div>';
                } else {
                    resultsDiv.innerHTML += '<div class="test-result error">❌ loadMarketData function not found</div>';
                    return;
                }
                
                // Test 2: Check if market data elements exist
                const marketElements = ['sp500', 'nasdaq', 'dow', 'wti', 'brent', 'natgas', 'vix', 'treasury'];
                let elementsFound = 0;
                
                marketElements.forEach(id => {
                    const element = document.getElementById(id);
                    if (element) {
                        elementsFound++;
                    }
                });
                
                if (elementsFound === marketElements.length) {
                    resultsDiv.innerHTML += '<div class="test-result success">✅ All market data elements found</div>';
                } else {
                    resultsDiv.innerHTML += `<div class="test-result error">❌ Only ${elementsFound}/${marketElements.length} market elements found</div>`;
                }
                
                // Test 3: Try to call loadMarketData
                try {
                    await loadMarketData();
                    resultsDiv.innerHTML += '<div class="test-result success">✅ loadMarketData function executed successfully</div>';
                } catch (error) {
                    resultsDiv.innerHTML += `<div class="test-result error">❌ loadMarketData failed: ${error.message}</div>`;
                }
                
            } catch (error) {
                resultsDiv.innerHTML += `<div class="test-result error">❌ Test failed: ${error.message}</div>`;
            }
        }
        
        // Run test when page loads
        document.addEventListener('DOMContentLoaded', testMarketData);
    </script>
    
    <p><strong>🌐 Your webscraper:</strong> <a href="https://quantumnews-ps23.3jcllc.com" target="_blank">https://quantumnews-ps23.3jcllc.com</a></p>
</body>
</html>
