<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Access Gate</title>
	<style>
		body { background:#0e0f12; color:#fff; font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; margin:0; }
		.card { background:#16181d; border:1px solid rgba(255,255,255,0.08); border-radius:16px; padding:24px; width:100%; max-width:520px; box-shadow:0 10px 30px rgba(0,0,0,0.25); }
		h1 { margin:0 0 8px; font-size:22px; color:#00d4aa; }
		p { margin:0 0 16px; color:#c9d1d9; }
		label { display:block; margin:12px 0 6px; font-weight:600; }
		input { display:block; width:240px; max-width:100%; padding:10px 12px; border-radius:10px; border:1px solid rgba(255,255,255,0.12); background:#0e0f12; color:#fff; }
		button { margin-top:14px; width:140px; padding:10px 12px; border-radius:10px; border:1px solid #00d4aa; background:#00d4aa; color:#000; font-weight:700; cursor:pointer; }
		.error { margin-top:12px; padding:10px; background:#2b1a1a; border:1px solid #ff6b6b; border-radius:8px; color:#ffb3b3; }
		.hint { margin-top:6px; font-size:12px; color:#9aa3af; }
	</style>
	{% if redirect_to_google %}
	<script>
		setTimeout(function(){ window.location.href = 'https://www.google.com'; }, 1500);
	</script>
	{% endif %}
</head>
<body>
	<div class="card">
		<h1>Quick Q&A</h1>
		<p>Please answer to enter:</p>
		{% if error %}
			<div class="error" role="alert">{{ error }}</div>
		{% endif %}
		<form method="POST">
			<label for="answer">{{ prompt or 'What is the expected value of a fair 6-sided die?' }}</label>
			{% if hint %}<div class="hint">Hint: {{ hint }}</div>{% endif %}
			<input id="answer" name="answer" inputmode="decimal" autocomplete="off" autofocus value="{{ previous_answer or '' }}" />
			<button type="submit">Enter</button>
		</form>
	</div>
</body>
</html>
