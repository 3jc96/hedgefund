<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FX Request - USD↔SGD</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; margin: 24px; background: #0b1020; color: #e6e9ef; }
      .card { max-width: 560px; margin: 0 auto; background: #121833; border: 1px solid #273055; border-radius: 12px; padding: 24px; }
      h1 { margin-top: 0; font-size: 22px; }
      label { display: block; margin: 14px 0 6px; font-size: 14px; color: #c8d0e0; }
      input, select, textarea { width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid #2e3a66; background: #0e1430; color: #e6e9ef; }
      button { margin-top: 16px; width: 100%; padding: 12px 14px; border-radius: 10px; border: 0; background: #3b82f6; color: white; font-weight: 600; cursor: pointer; }
      .muted { color: #9fb0d0; font-size: 13px; }
      .rate { padding: 10px; background: #0e1430; border: 1px solid #273055; border-radius: 8px; margin: 10px 0 16px; }
      .success { background: #0d2a1b; border: 1px solid #1f7a3e; padding: 12px; border-radius: 8px; margin-bottom: 16px; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Request a USD↔SGD Quote</h1>
      <div class="rate">Current reference USD/SGD: <strong>{{ '%.6f' % rate if rate else 'N/A' }}</strong></div>

      {% if submitted %}
      <div class="success">Thanks! Your request ID is <strong>{{ request_id }}</strong>. We'll email you shortly.</div>
      {% endif %}

      <form method="post">
        <label for="name">Your name</label>
        <input id="name" name="name" placeholder="Jane Doe" required />

        <label for="email">Email</label>
        <input id="email" name="email" type="email" placeholder="you@example.com" required />

        <label for="direction">Direction</label>
        <select id="direction" name="direction" required>
          <option value="USD->SGD">USD → SGD</option>
          <option value="SGD->USD">SGD → USD</option>
        </select>

        <label for="amount">Amount</label>
        <input id="amount" name="amount" type="number" step="0.01" min="0" placeholder="10000" required />

        <label for="note">Notes (optional)</label>
        <textarea id="note" name="note" rows="3" placeholder="Timing, bank, constraints..."></textarea>

        <button type="submit">Submit Request</button>
        <p class="muted">We use a live reference rate and will reply with an all-in quote.</p>
      </form>
    </div>
  </body>
  </html>
